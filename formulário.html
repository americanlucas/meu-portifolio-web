<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <section>
        <div>
            <h1>Escola Virtual</h1>
            <h2>Formulário Pré-Matrícula</h2>
        </div>
        <form name="formulario" action="">
            <fieldset>
                <legend><h3>Dados Pessoais</h3></legend>
                <label for="nome">Nome do Aluno: </label><input type="text" name="nome" placeholder="Insira seu nome"> <br>
                <label for="data">Nascimento (dd/mm/aaaa): </label><input type="date" name="data"> <br>
                <label for="pai">Nome do Pai: </label><input type="text" name="pai" placeholder="Insira o nome do Pai"> <br>
                <label for="mae">Nome da Mãe: </label><input type="text" name="mae" placeholder="Insira o nome da Mãe"> <br>
                <label for="telefone">Telefone: </label>DDD(<input type="tel" size="1" placeholder="061">) Tel: <input type="tel" name="telefone" placeholder="00000-0000"> Ramal:  <input type="tel" size="1" placeholder="000"> <br>
                <label for="">E-mail: </label><input type="email" name="email" placeholder="Insira o seu email"> <br>
            </fieldset>
            <fieldset>
                <legend><h3>Informações de Matrícula</h3></legend>
                <label for="serie">Série:</label>
                <select name="serie" id="serie">
                    <option value="pre">Pré-Escolar</option>
                    <option value="fundamental">Ensino Fundamental</option>
                    <option value="medio">Ensino Médio</option>
                    <option value="superior">Ensino Superior</option>
                </select> <br> <br>
                <label for="turno">Turno: </label> <br>
                <input type="radio" name="turno" checked> Manhã
                <input type="radio" name="turno"> Tarde <br> <br>
                <label for="atividades">Atividades Extracurriculares: </label> <br>
                <input type="checkbox" name="info" id=""> Informática <br>
                <input type="checkbox" name="musica" id=""> Música<br>
                <input type="checkbox" name="ballet" id=""> Ballet <br>
                <input type="checkbox" name="pintura" id=""> Pintura <br>
                <input type="checkbox" name="judo" id=""> Judô <br>
                <input type="checkbox" name="futebol" id=""> Futebol <br>
            </fieldset> <br>
            <button>Envia formulário</button> <button>Limpa Campos</button>
        </form>
    </section>
</body>
</html>
