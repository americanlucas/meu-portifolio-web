<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <h1>Listas não ordenadas:</h1>
        <ul type="circle">
            <li>Café</li>
            <li>Chá</li>
            <li>Coca Cola</li>
        </ul>
        <ul type="square">
            <li>Café</li>
            <li>Chá</li>
            <li>Coca Cola</li>
        </ul>
    </div>
    <div>
        <h1>Listas solicitadas:</h1>
        <ol>
            <li>Café</li>
            <li>Chá</li>
            <li>Coca Cola</li>
        </ol>
        <ol type="I">
            <li>Café</li>
            <li>Chá</li>
            <li>Coca Cola</li>
        </ol>
    </div>
</body>
</html>
